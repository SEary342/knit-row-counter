server {
    listen 80;
    server_name localhost;

    # Proxy to Vite dev server
    location / {
        proxy_pass http://127.0.0.1:5173;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Required for Vite HMR over WebSocket
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Proxy API requests to the backend service.
    # This assumes your API endpoints are prefixed with /api/
    location /api/ {
        proxy_pass http://backend:80/api/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy SQLAdmin and Auth routes to the backend
    location ~ ^/(auth|admin)/ {
        proxy_pass http://backend:80;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Rewrite redirects coming from the backend so they resolve to the frontend
        proxy_redirect http://backend:80/ /;
        proxy_redirect http://backend/ /;
    }
}
