services:
  frontend:
    # Development configuration. For production, use:
    # docker-compose -f docker-compose.yml -f docker-compose.prod.yml up
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - '3000:80'
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    restart: always

  backend:
    build: .
    ports:
      - '8000:80'
    # Enable live reload for backend code changes during development.
    # We mount the host backend source into the container, but keep the
    # virtualenv from the image (so we don't have to reinstall on every change).
    volumes:
      - ./backend:/backend/backend:delegated
    command:
      [
        '/backend/.venv/bin/fastapi',
        'run',
        'backend/main.py',
        '--port',
        '80',
        '--host',
        '0.0.0.0',
        '--reload',
      ]
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db-app:5432/${POSTGRES_DB}
      - KEYCLOAK_URL=http://localhost:8080
      - KEYCLOAK_CLIENT_ID=knit-app
      - KEYCLOAK_REALM=knit-realm
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET}
      - KEYCLOAK_REDIRECT_URI=http://localhost:3000/auth/callback
      - FRONTEND_URL=http://localhost:3000
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - SECRET_KEY=${SECRET_KEY}
    extra_hosts:
      - 'localhost:host-gateway'
    depends_on:
      db-app:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          '/backend/.venv/bin/python',
          '-c',
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:80')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    entrypoint:
      - /bin/sh
      - -c
      - |
        mkdir -p /opt/keycloak/data/import &&
        cp /tmp/realm-export.json /opt/keycloak/data/import/realm.json &&
        sed -i "s|\\$${KEYCLOAK_CLIENT_SECRET}|$$KEYCLOAK_CLIENT_SECRET|g" /opt/keycloak/data/import/realm.json &&
        /opt/keycloak/bin/kc.sh start-dev --import-realm
    environment:
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET}
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://db-keycloak:5432/keycloak_db
      - KC_DB_USERNAME=${POSTGRES_USER}
      - KC_DB_PASSWORD=${POSTGRES_PASSWORD}
      - KC_HOSTNAME_STRICT=false
    ports:
      - '8080:8080'
    volumes:
      - ./realm-export.json:/tmp/realm-export.json
    depends_on:
      db-keycloak:
        condition: service_healthy
    healthcheck:
      test: ['CMD', '/bin/bash', '-c', 'echo > /dev/tcp/127.0.0.1/8080']
      interval: 10s
      timeout: 5s
      retries: 10
    restart: always

  db-app:
    image: postgres:17-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_app_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  db-keycloak:
    image: postgres:17-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=keycloak_db
    volumes:
      - postgres_keycloak_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d keycloak_db']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

volumes:
  postgres_app_data:
  postgres_keycloak_data:
